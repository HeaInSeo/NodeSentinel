---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodesentinel
  namespace: nodesentinel-system
  labels:
    app.kubernetes.io/name: nodesentinel
    app.kubernetes.io/component: validation-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nodesentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nodesentinel
        app.kubernetes.io/component: validation-agent
    spec:
      serviceAccountName: nodesentinel
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nodesentinel
          image: harbor.10.113.24.96.nip.io/nodevault/nodesentinel:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50052
              protocol: TCP
          env:
            - name: NODESENTINEL_GRPC_PORT
              value: "50052"
            - name: NODESENTINEL_DB_PATH
              value: /var/lib/nodesentinel/nodesentinel.db
            - name: NODEVAULT_API_ADDR
              value: http://nodevault-controlplane.nodevault-system.svc:8082
            - name: SMOKE_NAMESPACE
              value: nodevault-smoke
          volumeMounts:
            - name: data
              mountPath: /var/lib/nodesentinel
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nodesentinel
  namespace: nodesentinel-system
  labels:
    app.kubernetes.io/name: nodesentinel
spec:
  selector:
    app.kubernetes.io/name: nodesentinel
  ports:
    - name: grpc
      port: 50052
      targetPort: grpc
      protocol: TCP
