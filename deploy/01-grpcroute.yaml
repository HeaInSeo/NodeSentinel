---
# Cilium GRPCRoute — NodeSentinel ingress gRPC 엔드포인트 외부 노출
#
# 전제 조건:
#   - Gateway API CRDs v1.3.0 이상 설치됨
#   - Cilium GatewayClass (cilium) + Gateway 가 설치됨
#   - NodeSentinel Deployment + Service 먼저 적용됨 (port 50052)
#
# 적용 후 접근 방법 (NodeKit/NodeVault 기준):
#   addr := "nodesentinel.apps.<base-domain>:80"
#   conn, _ := grpc.NewClient(addr, grpc.WithTransportCredentials(insecure.NewCredentials()))
#
# parentRef 수정 방법:
#   실제 Gateway 이름/네임스페이스를 아래 parentRefs에 반영해야 한다.
#   확인 명령: kubectl get gateway -A
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: nodesentinel-grpc
  namespace: nodesentinel-system
spec:
  parentRefs:
    - name: lab-gateway
      namespace: harbor
  hostnames:
    - "nodesentinel.apps.<base-domain>"
  rules:
    # 모든 gRPC 서비스/메서드를 허용 (matches 미지정 = 전체 통과)
    - backendRefs:
        - name: nodesentinel
          port: 50052
