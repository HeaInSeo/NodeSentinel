name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION_FILE: go.mod
  GOLANGCI_LINT_VERSION: v2.11.3
  COVERAGE_THRESHOLD: "70.0"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # 0. GitHub Actions workflow lint
  # ──────────────────────────────────────────────────────────────────
  workflow-lint:
    name: Workflow Lint (actionlint)
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v4

      - name: actionlint
        uses: rhysd/actionlint@v1
        with:
          args: -shellcheck=

  # ──────────────────────────────────────────────────────────────────
  # 1. Proto API lint (Buf)
  # ──────────────────────────────────────────────────────────────────
  proto-lint:
    name: Proto Lint (Buf)
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v4

      - name: Buf lint
        uses: bufbuild/buf-action@v1
        with:
          input: protos
          lint: true

  # ──────────────────────────────────────────────────────────────────
  # 2. 린트 (golangci-lint)
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Verify golangci-lint config
        run: make lint-config

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --config=.golangci.yml --timeout 10m

  # ──────────────────────────────────────────────────────────────────
  # 3. 모듈 / 빌드 / vet 검증
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build and Vet
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: go mod tidy check
        run: make mod-tidy-check

      - name: go build
        run: make build

      - name: go vet
        run: make vet

  # ──────────────────────────────────────────────────────────────────
  # 4. 유닛 테스트 (-race, -shuffle, -cover, 70% gate)
  # ──────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: go test (unit, -race, -shuffle)
        run: make test-unit

      - name: Enforce coverage >= 70%
        run: make coverage-check

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────
  # 5. K8s data-plane contract tests (bori-facing manifests)
  # ──────────────────────────────────────────────────────────────────
  k8s-contract:
    name: K8s Data Plane Contract
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: manifest contract tests
        run: make test-k8s

  # ──────────────────────────────────────────────────────────────────
  # 6. 취약점 스캔 (govulncheck)
  # ──────────────────────────────────────────────────────────────────
  vuln-scan:
    name: Vulnerability Scan (govulncheck)
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: govulncheck
        run: make vuln
