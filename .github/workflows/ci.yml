name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION_FILE: go.mod
  COVERAGE_THRESHOLD: "70.0"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # 1. 린트 (golangci-lint)
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          install-mode: goinstall
          args: --config=.golangci.yml --timeout 10m

  # ──────────────────────────────────────────────────────────────────
  # 2. 빌드 검증
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

  # ──────────────────────────────────────────────────────────────────
  # 3. 유닛 테스트 (-race, -cover, 70% gate)
  # ──────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: go test (unit, -race, -cover)
        run: |
          packages="$(go list ./... | grep -v '/cmd/' | grep -v '/protos/' | grep -v '/test/k8s')"
          go test \
            -v \
            -race \
            -covermode=atomic \
            -coverprofile=coverage.out \
            $packages

      - name: Enforce coverage >= 70%
        run: |
          coverage="$(go tool cover -func=coverage.out | awk '/^total:/ { gsub(/%/, "", $3); print $3 }')"
          awk -v got="$coverage" -v want="$COVERAGE_THRESHOLD" 'BEGIN {
            if (got + 0 < want + 0) {
              printf("coverage %.1f%% below required %.1f%%\n", got, want)
              exit 1
            }
            printf("coverage %.1f%% >= %.1f%%\n", got, want)
          }'

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────
  # 4. K8s data-plane contract tests (bori-facing manifests)
  # ──────────────────────────────────────────────────────────────────
  k8s-contract:
    name: K8s Data Plane Contract
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: manifest contract tests
        run: go test -v ./test/k8s/...

  # ──────────────────────────────────────────────────────────────────
  # 5. 취약점 스캔 (govulncheck)
  # ──────────────────────────────────────────────────────────────────
  vuln-scan:
    name: Vulnerability Scan (govulncheck)
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
