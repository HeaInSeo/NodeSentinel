name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION_FILE: go.mod

jobs:
  # ──────────────────────────────────────────────────────────────────
  # 1. 린트 (golangci-lint)
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          install-mode: goinstall
          args: --timeout 10m

  # ──────────────────────────────────────────────────────────────────
  # 2. 빌드 검증
  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

  # ──────────────────────────────────────────────────────────────────
  # 3. 유닛 테스트 (-race, -cover)
  # ──────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: go test (unit, -race, -cover)
        run: |
          go test \
            -v \
            -race \
            -cover \
            -covermode=atomic \
            -coverprofile=coverage.out \
            ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────
  # 4. 취약점 스캔 (govulncheck)
  # ──────────────────────────────────────────────────────────────────
  vuln-scan:
    name: Vulnerability Scan (govulncheck)
    runs-on: [self-hosted, linux, podbridge5]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
